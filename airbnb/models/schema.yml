models:
  - name: dim_listings_cleansed
    description: Cleansed table wihich contains Airbnb listings.
    data_tests:
      - minimum_row_count:
          severity: warn
          arguments:
            min_row_count: 1000

    columns:
      - name: listing_id
        description: Primary key for the listing.
        data_tests:
          - unique
          - not_null
    
      - name: host_id
        description: The host's id. Foreign key to the host table.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_hosts_cleansed')
                field: host_id

      - name: room_type
        description: Type of the apartment/room.
        data_tests:
          - accepted_values:
              arguments:
                values: ['Entire home/apt', 'Private room', 'Shared room', 'Hotel room']

      - name: minimum_nights
        description: '{{ doc("dim_listing_cleansed__minimum_nights") }}'
        data_tests:
          - positive_values

  - name: dim_hosts_cleansed
    description: Cleansed table which contains Airbnb hosts.
    config:
      contract:
        enforced: true

    columns:
      - name: host_id
        description: Primary key for the host.
        data_type: integer
        data_tests:
          - unique
          - not_null

      - name: host_name
        description: Name of the host.
        data_type: string
        data_tests:
          - not_null

      - name: is_superhost
        description: Is the host classified as a superhost?
        data_type: string
        data_tests:
          - accepted_values:
              arguments:
                values: ['t', 'f']

      - name: created_at
        description: Timestamp, when the row has been created.
        data_type: timestamp

      - name: updated_at
        description: Timestamp, when the row has been updated last time.
        data_type: timestamp